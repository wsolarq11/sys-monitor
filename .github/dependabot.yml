version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/sys-monitor/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"

  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/sys-monitor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci-cd"
