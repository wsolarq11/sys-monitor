name: System Health Check

on:
  push:
    paths:
      - '.lingma/**'
      - 'scripts/*.py'
  pull_request:
    paths:
      - '.lingma/**'
      - 'scripts/*.py'
  schedule:
    - cron: '0 9 * * 1'  # 每周一上午9点自动检查
  workflow_dispatch:  # 支持手动触发

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run Full System Scan
        run: |
          echo "🔍 开始全盘系统扫描..."
          python scripts/full_system_scan.py
      
      - name: Run Component Optimization Check
        run: |
          echo "🔍 检查组件优化状态..."
          python scripts/batch_optimize_components.py
      
      - name: Run Effectiveness Verification
        run: |
          echo "🔍 验证系统有效性..."
          python scripts/verify_system_effectiveness.py
      
      - name: Check for Issues
        if: failure()
        run: |
          echo ""
          echo "=========================================="
          echo "❌ 系统检测到问题，必须修复后才能合并"
          echo "=========================================="
          echo ""
          echo "请查看上面的扫描结果，修复所有问题后重新提交。"
          echo ""
          echo "常见问题:"
          echo "- .lingma/docs/ 根目录文档过多（应 ≤5 个）"
          echo "- 存在重复主题的文档（MCP/Rules/清洁等）"
          echo "- Agent/Rule/Skill 文件过大"
          echo "- 功能目录存在 README.md"
          echo ""
          exit 1
      
      - name: Success Report
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 系统健康检查通过"
          echo "=========================================="
          echo ""
          echo "所有组件符合规范，系统运行正常。"
