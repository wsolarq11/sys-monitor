name: CI/CD Multi-Platform Tests

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C codegen-units=1"

jobs:
  # Rust Backend Tests
  test-backend:
    name: Backend Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sys-monitor/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('sys-monitor/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo fmt check
        working-directory: ./sys-monitor/src-tauri
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        working-directory: ./sys-monitor/src-tauri
        run: cargo clippy -- -D warnings

      - name: Run backend tests
        working-directory: ./sys-monitor/src-tauri
        run: cargo test --lib

      - name: Build backend
        working-directory: ./sys-monitor/src-tauri
        run: cargo build --release

  # Frontend Tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'sys-monitor/pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('sys-monitor/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: ./sys-monitor
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        working-directory: ./sys-monitor
        run: pnpm exec tsc --noEmit

      - name: Run frontend tests
        working-directory: ./sys-monitor
        run: pnpm test

      - name: Build frontend
        working-directory: ./sys-monitor
        run: pnpm build

  # Tauri App Build Test
  build-tauri:
    name: Tauri Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test-backend, test-frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sys-monitor/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('sys-monitor/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'sys-monitor/pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('sys-monitor/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install webkit2gtk

      - name: Install dependencies
        working-directory: ./sys-monitor
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./sys-monitor
          args: --release

      - name: Upload build artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.run_number }}
          path: |
            sys-monitor/src-tauri/target/release/bundle/msi/*.msi
            sys-monitor/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload build artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ github.run_number }}
          path: |
            sys-monitor/src-tauri/target/release/bundle/deb/*.deb
            sys-monitor/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload build artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.run_number }}
          path: |
            sys-monitor/src-tauri/target/release/bundle/dmg/*.dmg
            sys-monitor/src-tauri/target/release/bundle/macos/*.app

  # Code Coverage (Linux only)
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sys-monitor/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('sys-monitor/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate code coverage
        working-directory: ./sys-monitor/src-tauri
        run: cargo llvm-cov --lib --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./sys-monitor/src-tauri/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
