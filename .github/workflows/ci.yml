name: CI/CD Multi-Platform Tests

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger for debugging

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C codegen-units=1"

jobs:
  # Rust Backend Tests
  test-backend:
    name: Backend Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install webkit2gtk

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sys-monitor/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('sys-monitor/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo fmt check
        working-directory: ./sys-monitor/src-tauri
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        working-directory: ./sys-monitor/src-tauri
        run: |
          echo "=== Running cargo clippy with verbose output ==="
          cargo clippy --verbose 2>&1 | tee clippy-output.txt
          echo "=== Checking for warnings ==="
          if grep -q "warning:" clippy-output.txt; then
            echo "❌ Clippy warnings found:"
            grep -A 5 "warning:" clippy-output.txt
            exit 1
          else
            echo "✅ No clippy warnings"
          fi

      - name: Run backend tests
        working-directory: ./sys-monitor/src-tauri
        run: cargo test --lib

      - name: Build backend
        working-directory: ./sys-monitor/src-tauri
        run: cargo build --release

  # Frontend Tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'sys-monitor/pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('sys-monitor/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: ./sys-monitor
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        working-directory: ./sys-monitor
        run: pnpm exec tsc --noEmit

      - name: Run frontend tests
        working-directory: ./sys-monitor
        run: pnpm test

      - name: Build frontend
        working-directory: ./sys-monitor
        run: pnpm build

  # Agent Tests with AsyncIO and Redis
