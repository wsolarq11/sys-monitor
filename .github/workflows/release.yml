name: Release Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v2.0.0)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C codegen-units=1"

jobs:
  # 构建阶段
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: msi
          - platform: windows-latest
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nsis
          - platform: macos-latest
            os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: dmg
          - platform: macos-latest
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: dmg
          - platform: ubuntu-latest
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: deb
          - platform: ubuntu-latest
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: appimage

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sys-monitor/src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('sys-monitor/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'sys-monitor/pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf desktop-file-utils libgdk-pixbuf2.0-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install webkit2gtk

      - name: Install dependencies
        working-directory: ./sys-monitor
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: ./sys-monitor
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.artifact_name }}-${{ matrix.target }}
          path: |
            sys-monitor/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            sys-monitor/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            sys-monitor/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            sys-monitor/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            sys-monitor/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 5

  # 发布阶段
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "## 版本 $VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 更新内容" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md 2>/dev/null || echo "- 首次发布" >> CHANGELOG.md
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: "SysMonitor ${{ github.event.inputs.version || github.ref_name }}"
          body_path: CHANGELOG.md
          draft: true
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage

      - name: Display release info
        run: |
          echo "✅ 发布创建成功!"
          echo "📦 版本: ${{ github.event.inputs.version || github.ref_name }}"
          echo "🔗 发布页面: https://github.com/${{ github.repository }}/releases"
