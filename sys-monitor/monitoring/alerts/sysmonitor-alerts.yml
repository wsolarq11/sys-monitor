groups:
- name: sysmonitor-alerts
  rules:
  - alert: HighErrorRate
    expr: rate({app="sys-monitor"} | json | level="ERROR" [5m]) > 0.1
    for: 2m
    labels:
      severity: warning
      team: sysmonitor
    annotations:
      summary: "High error rate detected in SysMonitor"
      description: "Error rate is {{ $value }} errors per second"

  - alert: ApplicationDown
    expr: up{job="sysmonitor-app"} == 0
    for: 1m
    labels:
      severity: critical
      team: sysmonitor
    annotations:
      summary: "SysMonitor application is down"
      description: "The application has been down for more than 1 minute"

  - alert: HighMemoryUsage
    expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.8
    for: 5m
    labels:
      severity: warning
      team: sysmonitor
    annotations:
      summary: "High memory usage detected"
      description: "Memory usage is {{ $value | humanizePercentage }}"

  - alert: HighCPUUsage
    expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 5m
    labels:
      severity: warning
      team: sysmonitor
    annotations:
      summary: "High CPU usage detected"
      description: "CPU usage is {{ $value }}%"

  - alert: SlowResponseTime
    expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
    for: 2m
    labels:
      severity: warning
      team: sysmonitor
    annotations:
      summary: "Slow response time detected"
      description: "95th percentile response time is {{ $value }} seconds"

  - alert: DiskSpaceLow
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
    for: 2m
    labels:
      severity: critical
      team: sysmonitor
    annotations:
      summary: "Low disk space"
      description: "Disk space is running low ({{ $value | humanizePercentage }} available)"