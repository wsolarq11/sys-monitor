<!DOCTYPE html>
<html>
<head>
    <title>扫描功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        button { margin: 5px; padding: 10px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>SysMonitor 扫描功能测试</h1>
    
    <div class="test-section">
        <h3>1. 测试数据库路径</h3>
        <button onclick="testDbPath()">测试数据库路径</button>
        <div id="dbResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. 测试文件夹选择</h3>
        <button onclick="testFolderSelect()">测试文件夹选择</button>
        <div id="folderResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>3. 测试扫描功能</h3>
        <input type="text" id="testPath" placeholder="输入测试路径" value="C:\\Windows\\System32\\drivers\\etc" style="width: 300px; padding: 5px;">
        <button onclick="testScan()">测试扫描</button>
        <div id="scanResult" class="result"></div>
    </div>
    
    <script>
        async function testDbPath() {
            const resultDiv = document.getElementById('dbResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                const dbPath = await window.__TAURI_INVOKE__('get_db_path');
                resultDiv.innerHTML = `<div class="success">✅ 数据库路径: ${dbPath}</div>`;
                console.log('数据库路径:', dbPath);
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 失败: ${error}</div>`;
                console.error('数据库路径错误:', error);
            }
        }
        
        async function testFolderSelect() {
            const resultDiv = document.getElementById('folderResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                const folderPath = await window.__TAURI_INVOKE__('select_folder');
                resultDiv.innerHTML = `<div class="success">✅ 选择的文件夹: ${folderPath}</div>`;
                console.log('文件夹选择:', folderPath);
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">ℹ️ 取消或失败: ${error}</div>`;
                console.log('文件夹选择:', error);
            }
        }
        
        async function testScan() {
            const resultDiv = document.getElementById('scanResult');
            const testPath = document.getElementById('testPath').value;
            resultDiv.innerHTML = '测试中...';
            
            try {
                const dbPath = await window.__TAURI_INVOKE__('get_db_path');
                console.log('开始扫描:', testPath);
                
                const result = await window.__TAURI_INVOKE__('scan_folder', {
                    path: testPath,
                    db_path: dbPath
                });
                
                resultDiv.innerHTML = `<div class="success">
                    ✅ 扫描成功!<br>
                    文件数: ${result.file_count}<br>
                    文件夹数: ${result.folder_count}<br>
                    总大小: ${result.total_size} bytes<br>
                    耗时: ${result.scan_duration_ms}ms
                </div>`;
                console.log('扫描结果:', result);
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 扫描失败: ${error}</div>`;
                console.error('扫描错误:', error);
                console.error('错误详情:', {
                    message: error.message,
                    stack: error.stack,
                    toString: String(error)
                });
            }
        }
    </script>
</body>
</html>
